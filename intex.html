<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Está bien...</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #b3b3b3;
            font-family: 'Arial', sans-serif;
            text-align: center;
            flex-direction: column;
        }
        .container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 28px;
            opacity: 0.8;
        }
        p {
            font-size: 18px;
        }
    </style>
</head>
<body onload="lluviaOscura()">
    <div class="container">
        <h1>Está bien...</h1>
        <p>Quizás en otro universo...</p>
    </div>

    <script>
        function lluviaOscura() {
            var duration = 5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    startVelocity: 10,
                    spread: 70,
                    origin: { x: Math.random(), y: 0 },
                    colors: ['#555555', '#222222', '#444444', '#777777']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            })();
        }
    </script>
</body>
</html>
